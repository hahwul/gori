<script>
  /* Theme toggle: flip data-theme, remember the choice, and swap the TUI
     screenshots to the matching light/dark capture. */
  (function () {
    /* Point every TUI screenshot at its light or dark capture. The light set
       lives under images/tui/light/; the theme gallery (theme-*.svg) is left
       alone, and any shot without a light twin falls back to the dark one. */
    function syncTuiShots() {
      var light = document.documentElement.getAttribute("data-theme") === "light";
      var imgs = document.querySelectorAll('img[src*="/images/tui/"]');
      for (var i = 0; i < imgs.length; i++) {
        var img = imgs[i];
        if (img.dataset.noLight === "1") continue;
        /* Decide from the ORIGINAL dark src, not the live one (which may already
           be swapped to the light path from a previous toggle). */
        var orig = img.dataset.darkSrc || img.getAttribute("src");
        if (orig.indexOf("/images/tui/light/") !== -1 || /\/images\/tui\/theme-/.test(orig)) continue;
        if (!img.dataset.darkSrc) img.dataset.darkSrc = orig;
        var want = light ? orig.replace("/images/tui/", "/images/tui/light/") : orig;
        if (img.getAttribute("src") === want) continue;
        if (light) {
          img.onerror = function () { this.onerror = null; this.dataset.noLight = "1"; this.setAttribute("src", this.dataset.darkSrc); };
        } else {
          img.onerror = null;
        }
        img.setAttribute("src", want);
      }
    }

    var btn = document.getElementById("themeToggle");
    if (btn) {
      btn.addEventListener("click", function () {
        var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("gori-theme", next); } catch (e) {}
        syncTuiShots();
      });
    }
    syncTuiShots();
  })();
</script>
