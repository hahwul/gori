<script>
  /* Theme toggle: flip data-theme, remember the choice, and swap the TUI
     screenshots to the matching light/dark capture. */
  (function () {
    /* Point every TUI screenshot at its light or dark capture. The light set
       lives under images/tui/light/; the theme gallery (theme-*.svg) is left
       alone, and any shot without a light twin falls back to the dark one. */
    function syncTuiShots() {
      var light = document.documentElement.getAttribute("data-theme") === "light";
      var imgs = document.querySelectorAll('img[src*="/images/tui/"]');
      for (var i = 0; i < imgs.length; i++) {
        var img = imgs[i];
        if (img.dataset.noLight === "1") continue;
        /* Decide from the ORIGINAL dark src, not the live one (which may already
           be swapped to the light path from a previous toggle). */
        var orig = img.dataset.darkSrc || img.getAttribute("src");
        if (orig.indexOf("/images/tui/light/") !== -1 || /\/images\/tui\/theme-/.test(orig)) continue;
        if (!img.dataset.darkSrc) img.dataset.darkSrc = orig;
        var want = light ? orig.replace("/images/tui/", "/images/tui/light/") : orig;
        if (img.getAttribute("src") === want) continue;
        if (light) {
          img.onerror = function () { this.onerror = null; this.dataset.noLight = "1"; this.setAttribute("src", this.dataset.darkSrc); };
        } else {
          img.onerror = null;
        }
        img.setAttribute("src", want);
      }
    }

    var btn = document.getElementById("themeToggle");
    if (btn) {
      btn.addEventListener("click", function () {
        var next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", next);
        try { localStorage.setItem("gori-theme", next); } catch (e) {}
        syncTuiShots();
      });
    }
    syncTuiShots();
  })();

  /* Language dropdown: close on outside click or Escape (it closes on its own
     when a language is chosen, since that navigates away). */
  (function () {
    var ls = document.getElementById("langSwitcher");
    if (!ls) return;
    document.addEventListener("click", function (e) {
      if (ls.open && !ls.contains(e.target)) ls.removeAttribute("open");
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape" && ls.open) ls.removeAttribute("open");
    });
  })();

  /* Hero install picker: swap the one-liner for the chosen channel, copy it
     on click. Present only on the home page. */
  (function () {
    var root = document.getElementById("heroInstall");
    if (!root) return;
    var cmd = document.getElementById("installCmd");
    var tabs = root.querySelectorAll(".install-tab");
    function pick() {
      for (var i = 0; i < tabs.length; i++) tabs[i].setAttribute("aria-pressed", tabs[i] === this ? "true" : "false");
      cmd.textContent = this.getAttribute("data-cmd");
    }
    for (var i = 0; i < tabs.length; i++) tabs[i].addEventListener("click", pick);

    var btn = document.getElementById("installCopy");
    var timer = null;
    btn.addEventListener("click", function () {
      var text = cmd.textContent;
      function done() {
        btn.classList.add("copied");
        if (timer) clearTimeout(timer);
        timer = setTimeout(function () { btn.classList.remove("copied"); }, 1600);
      }
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(done, function () {});
      } else {
        /* http:// preview, or clipboard API rejections (focus/permission) */
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try { if (document.execCommand("copy")) done(); } catch (e) {}
        document.body.removeChild(ta);
      }
    });
  })();
</script>
