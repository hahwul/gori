<div class="search-overlay" id="searchOverlay" onclick="if(event.target===this)closeSearch()">
  <div class="search-modal" role="dialog" aria-modal="true" aria-label="{{ "a11y.search_docs" | t }}">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="m21 21-4.3-4.3"></path>
      </svg>
      <input type="search" id="searchInput" aria-label="{{ "a11y.search" | t }}" placeholder="{{ "search.placeholder" | t }}" autocomplete="off" spellcheck="false">
      <kbd class="search-esc" onclick="closeSearch()">ESC</kbd>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>
