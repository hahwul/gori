name: gori
version: 0.1.0

authors:
  - hahwul <hahwul@gmail.com>

targets:
  gori:
    main: src/main.cr

crystal: '>= 1.20.2'

license: Apache-2.0

# System libraries linked by default (via pkg-config) for HTTP body decode in the
# detail view: libbrotlidec (Content-Encoding: br) and libzstd (zstd). Install on
# macOS: `brew install brotli zstd`; Debian/Ubuntu: `apt install libbrotli-dev
# libzstd-dev`. To build WITHOUT them (gzip/deflate still work via stdlib), pass
# `-Dwithout_native_codecs` to `crystal build`.

dependencies:
  termisu:
    github: hahwul/termisu
    branch: main
    # Using fork main for active development of input/preedit fixes (see recent commits on hahwul/termisu)
    # Current: fixed double-English + jamo-separation by using 17u flags + parser text extraction + protocol_active guard + Preedit for key=0 text events.

  db:
    github: crystal-lang/crystal-db
    version: ~> 0.14
  sqlite3:
    github: crystal-lang/crystal-sqlite3
    version: ~> 0.23

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
